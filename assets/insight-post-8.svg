<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Software inventory review: discovery, validation, normalization, and infrastructure context.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4eee0"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffefb"/>
      <stop offset="1" stop-color="#f3eee3"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d6b5f"/>
      <stop offset="1" stop-color="#d0892f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <rect x="80" y="92" width="1040" height="446" rx="26" fill="url(#card)" stroke="#dfd5c4" stroke-width="2"/>
  <rect x="80" y="92" width="1040" height="8" rx="4" fill="url(#bar)"/>

  <text x="130" y="164" font-family="Inter, system-ui, Arial" font-size="34" font-weight="800" fill="#1f2a34">Review Software Inventory</text>
  <text x="130" y="198" font-family="Inter, system-ui, Arial" font-size="18" fill="#596572">Discovery + validation + normalization, with infrastructure context for licensing.</text>

  <g>
    <rect x="130" y="240" width="620" height="260" rx="18" fill="#fff" stroke="#dfd5c4"/>

    <rect x="130" y="240" width="620" height="48" rx="18" fill="#eef2f7"/>
    <text x="154" y="270" font-family="Inter, system-ui, Arial" font-size="16" font-weight="800" fill="#1f2a34">CMDB Software Installations</text>

    <g font-family="Inter, system-ui, Arial" font-size="14" fill="#596572">
      <text x="154" y="318">Publisher</text>
      <text x="324" y="318">Product</text>
      <text x="494" y="318">Version</text>
      <text x="604" y="318">Edition</text>
    </g>

    <g>
      <rect x="154" y="336" width="140" height="26" rx="8" fill="#edf7f3" stroke="#cfe7de"/>
      <rect x="324" y="336" width="140" height="26" rx="8" fill="#edf7f3" stroke="#cfe7de"/>
      <rect x="494" y="336" width="90" height="26" rx="8" fill="#f5efe2" stroke="#dfd5c4"/>
      <rect x="604" y="336" width="110" height="26" rx="8" fill="#f5efe2" stroke="#dfd5c4"/>

      <rect x="154" y="372" width="140" height="26" rx="8" fill="#eef2f7" stroke="#d6deea"/>
      <rect x="324" y="372" width="140" height="26" rx="8" fill="#eef2f7" stroke="#d6deea"/>
      <rect x="494" y="372" width="90" height="26" rx="8" fill="#f5efe2" stroke="#dfd5c4"/>
      <rect x="604" y="372" width="110" height="26" rx="8" fill="#f5efe2" stroke="#dfd5c4"/>

      <rect x="154" y="408" width="140" height="26" rx="8" fill="#fff" stroke="#dfd5c4"/>
      <rect x="324" y="408" width="140" height="26" rx="8" fill="#fff" stroke="#dfd5c4"/>
      <rect x="494" y="408" width="90" height="26" rx="8" fill="#fff" stroke="#dfd5c4"/>
      <rect x="604" y="408" width="110" height="26" rx="8" fill="#fff" stroke="#dfd5c4"/>
    </g>

    <g>
      <circle cx="712" cy="468" r="26" fill="#0d6b5f" opacity="0.10"/>
      <circle cx="712" cy="468" r="12" fill="#0d6b5f" opacity="0.30"/>
      <path d="M 724 480 L 742 498" stroke="#0d6b5f" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
    </g>

    <text x="154" y="472" font-family="Inter, system-ui, Arial" font-size="14" fill="#596572">Validate attributes (publisher, product, version, edition)</text>
  </g>

  <g>
    <rect x="780" y="240" width="300" height="170" rx="18" fill="#edf7f3" stroke="#cfe7de"/>
    <text x="806" y="274" font-family="Inter, system-ui, Arial" font-size="16" font-weight="800" fill="#075247">Normalization</text>
    <text x="806" y="304" font-family="Inter, system-ui, Arial" font-size="14" fill="#596572">Align discovered data to a software library</text>

    <rect x="806" y="328" width="248" height="12" rx="6" fill="#0d6b5f" opacity="0.18"/>
    <rect x="806" y="350" width="210" height="12" rx="6" fill="#0d6b5f" opacity="0.12"/>
    <rect x="806" y="372" width="232" height="12" rx="6" fill="#0d6b5f" opacity="0.10"/>
  </g>

  <g>
    <rect x="780" y="430" width="300" height="70" rx="18" fill="#eef2f7" stroke="#d6deea"/>
    <text x="806" y="462" font-family="Inter, system-ui, Arial" font-size="16" font-weight="800" fill="#1a6fa1">Infrastructure context</text>

    <g>
      <rect x="806" y="476" width="44" height="18" rx="6" fill="#1a6fa1" opacity="0.18"/>
      <rect x="858" y="472" width="54" height="22" rx="8" fill="#1a6fa1" opacity="0.14"/>
      <rect x="920" y="476" width="44" height="18" rx="6" fill="#1a6fa1" opacity="0.18"/>
      <rect x="972" y="472" width="64" height="22" rx="8" fill="#1a6fa1" opacity="0.14"/>
    </g>

    <g font-family="Inter, system-ui, Arial" font-size="12" fill="#596572">
      <text x="808" y="512">on-prem</text>
      <text x="872" y="512">cluster</text>
      <text x="925" y="512">cloud</text>
    </g>
  </g>

  <g opacity="0.45">
    <path d="M 750 318 H 780" stroke="#1f2a34" stroke-width="4" stroke-linecap="round"/>
    <path d="M 770 308 L 780 318 L 770 328" fill="#1f2a34"/>
  </g>
</svg>
