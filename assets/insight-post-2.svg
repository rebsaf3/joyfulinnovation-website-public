<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title2 desc2">
  <title id="title2">Compliance Audit Trail</title>
  <desc id="desc2">Timeline style graphic with secure logs and export records.</desc>
  <defs>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#edf4fb"/>
      <stop offset="100%" stop-color="#deebf8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#g2)"/>
  <line x1="120" y1="210" x2="680" y2="210" stroke="#1a6fa1" stroke-width="8" stroke-linecap="round"/>
  <circle cx="190" cy="210" r="30" fill="#ffffff" stroke="#1a6fa1" stroke-width="6"/>
  <circle cx="400" cy="210" r="30" fill="#ffffff" stroke="#1a6fa1" stroke-width="6"/>
  <circle cx="610" cy="210" r="30" fill="#ffffff" stroke="#1a6fa1" stroke-width="6"/>
  <text x="190" y="150" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#1f2a34" font-weight="700">Sent</text>
  <text x="400" y="150" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#1f2a34" font-weight="700">Responded</text>
  <text x="610" y="150" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#1f2a34" font-weight="700">Exported</text>
  <text x="190" y="280" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455460">Timestamp</text>
  <text x="400" y="280" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455460">IP + Status</text>
  <text x="610" y="280" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455460">CSV Evidence</text>
</svg>
