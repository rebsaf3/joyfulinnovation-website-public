<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="AI chatbot architecture flow: intent, entities, dialogue, orchestration, and feedback.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2f7"/>
      <stop offset="1" stop-color="#f4eee0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffefb"/>
      <stop offset="1" stop-color="#f3eee3"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d6b5f"/>
      <stop offset="1" stop-color="#1a6fa1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <rect x="80" y="92" width="1040" height="446" rx="26" fill="url(#card)" stroke="#dfd5c4" stroke-width="2"/>
  <rect x="80" y="92" width="1040" height="8" rx="4" fill="url(#bar)"/>

  <text x="130" y="164" font-family="Inter, system-ui, Arial" font-size="34" font-weight="800" fill="#1f2a34">AI Chatbots in 2026</text>
  <text x="130" y="198" font-family="Inter, system-ui, Arial" font-size="18" fill="#596572">From intent to action, with guardrails and measurable outcomes.</text>

  <g>
    <rect x="130" y="248" width="200" height="78" rx="16" fill="#edf7f3" stroke="#cfe7de"/>
    <text x="154" y="292" font-family="Inter, system-ui, Arial" font-size="18" font-weight="800" fill="#075247">Intent</text>
    <text x="154" y="316" font-family="Inter, system-ui, Arial" font-size="13" fill="#596572">What the user wants</text>

    <rect x="360" y="248" width="200" height="78" rx="16" fill="#eef2f7" stroke="#d6deea"/>
    <text x="384" y="292" font-family="Inter, system-ui, Arial" font-size="18" font-weight="800" fill="#1a6fa1">Entities</text>
    <text x="384" y="316" font-family="Inter, system-ui, Arial" font-size="13" fill="#596572">Key details extracted</text>

    <rect x="590" y="248" width="200" height="78" rx="16" fill="#fff" stroke="#dfd5c4"/>
    <text x="614" y="292" font-family="Inter, system-ui, Arial" font-size="18" font-weight="800" fill="#1f2a34">Dialogue</text>
    <text x="614" y="316" font-family="Inter, system-ui, Arial" font-size="13" fill="#596572">Context across turns</text>

    <rect x="820" y="248" width="250" height="78" rx="16" fill="#f5efe2" stroke="#dfd5c4"/>
    <text x="844" y="292" font-family="Inter, system-ui, Arial" font-size="18" font-weight="800" fill="#d0892f">Orchestration</text>
    <text x="844" y="316" font-family="Inter, system-ui, Arial" font-size="13" fill="#596572">APIs, DB, RPA actions</text>
  </g>

  <g opacity="0.55">
    <path d="M 330 287 H 360" stroke="#1f2a34" stroke-width="4" stroke-linecap="round"/>
    <path d="M 560 287 H 590" stroke="#1f2a34" stroke-width="4" stroke-linecap="round"/>
    <path d="M 790 287 H 820" stroke="#1f2a34" stroke-width="4" stroke-linecap="round"/>
    <path d="M 350 277 L 360 287 L 350 297" fill="#1f2a34"/>
    <path d="M 580 277 L 590 287 L 580 297" fill="#1f2a34"/>
    <path d="M 810 277 L 820 287 L 810 297" fill="#1f2a34"/>
  </g>

  <g>
    <rect x="130" y="366" width="640" height="150" rx="18" fill="#fff" stroke="#dfd5c4"/>
    <text x="154" y="404" font-family="Inter, system-ui, Arial" font-size="16" font-weight="800" fill="#1f2a34">Quality and Safety</text>

    <g font-family="Inter, system-ui, Arial" font-size="14" fill="#596572">
      <text x="154" y="432">Guardrails: allow/deny, retrieval, prompt isolation</text>
      <text x="154" y="456">Human-in-the-loop: sensitive topics and high-stakes actions</text>
      <text x="154" y="480">Evaluation: transcripts + test cases, accuracy + safety</text>
      <text x="154" y="504">Data minimization: mask/hash sensitive fields</text>
    </g>
  </g>

  <g>
    <rect x="800" y="366" width="270" height="150" rx="18" fill="#edf7f3" stroke="#cfe7de"/>
    <text x="824" y="404" font-family="Inter, system-ui, Arial" font-size="16" font-weight="800" fill="#075247">Feedback loop</text>
    <text x="824" y="430" font-family="Inter, system-ui, Arial" font-size="14" fill="#596572">Unhandled intents</text>
    <text x="824" y="452" font-family="Inter, system-ui, Arial" font-size="14" fill="#596572">Weekly improvements</text>

    <circle cx="1040" cy="470" r="30" fill="#0d6b5f" opacity="0.12"/>
    <path d="M 1028 466 C 1035 454 1049 454 1056 466" fill="none" stroke="#0d6b5f" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 1029 476 C 1037 486 1047 486 1055 476" fill="none" stroke="#0d6b5f" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
