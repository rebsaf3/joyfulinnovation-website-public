<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title1 desc1">
  <title id="title1">License Reclaim Workflow</title>
  <desc id="desc1">Three-stage visual showing compare, verify, and reclaim process.</desc>
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e7f3ef"/>
      <stop offset="100%" stop-color="#dbece6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#g1)"/>
  <rect x="78" y="120" width="186" height="180" rx="20" fill="#ffffff" stroke="#cfe1d8"/>
  <rect x="308" y="120" width="186" height="180" rx="20" fill="#ffffff" stroke="#cfe1d8"/>
  <rect x="538" y="120" width="186" height="180" rx="20" fill="#ffffff" stroke="#cfe1d8"/>
  <path d="M267 210h34" stroke="#0d6b5f" stroke-width="10" stroke-linecap="round"/>
  <path d="M497 210h34" stroke="#0d6b5f" stroke-width="10" stroke-linecap="round"/>
  <text x="171" y="176" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0d6b5f" font-weight="700">Compare</text>
  <text x="401" y="176" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0d6b5f" font-weight="700">Verify</text>
  <text x="631" y="176" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#0d6b5f" font-weight="700">Reclaim</text>
  <text x="171" y="224" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455460">CSV + AD</text>
  <text x="401" y="224" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455460">Email Response</text>
  <text x="631" y="224" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455460">Budget Recovery</text>
</svg>

