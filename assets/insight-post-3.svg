<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title3 desc3">
  <title id="title3">AI Risk Prioritization</title>
  <desc id="desc3">Bar chart style graphic showing risk categories and focus areas.</desc>
  <defs>
    <linearGradient id="g3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6efe2"/>
      <stop offset="100%" stop-color="#eadbc4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#g3)"/>
  <rect x="130" y="250" width="130" height="100" rx="12" fill="#0d6b5f"/>
  <rect x="335" y="190" width="130" height="160" rx="12" fill="#d0892f"/>
  <rect x="540" y="130" width="130" height="220" rx="12" fill="#1a6fa1"/>
  <text x="195" y="375" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#1f2a34">Dormant</text>
  <text x="400" y="375" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#1f2a34">At-Risk</text>
  <text x="605" y="375" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#1f2a34">Review</text>
  <text x="400" y="80" text-anchor="middle" font-size="30" font-family="Arial, sans-serif" fill="#1f2a34" font-weight="700">Prioritize High-Impact Actions</text>
</svg>

