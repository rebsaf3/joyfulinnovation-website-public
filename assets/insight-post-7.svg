<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Four-phase SAM journey: onboarding, activation, deployment, usage.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2f7"/>
      <stop offset="1" stop-color="#f4eee0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffefb"/>
      <stop offset="1" stop-color="#f3eee3"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d6b5f"/>
      <stop offset="1" stop-color="#d0892f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <rect x="90" y="110" width="1020" height="410" rx="26" fill="url(#card)" stroke="#dfd5c4" stroke-width="2"/>
  <rect x="90" y="110" width="1020" height="8" rx="4" fill="url(#bar)"/>

  <text x="140" y="180" font-family="Inter, system-ui, Arial" font-size="34" font-weight="800" fill="#1f2a34">SAM On Demand</text>
  <text x="140" y="216" font-family="Inter, system-ui, Arial" font-size="18" fill="#596572">A four-phase roadmap: set the foundation, activate, deploy, then optimize usage.</text>

  <g>
    <rect x="140" y="260" width="230" height="190" rx="18" fill="#edf7f3" stroke="#cfe7de"/>
    <text x="166" y="300" font-family="Inter, system-ui, Arial" font-size="16" font-weight="800" fill="#075247">01</text>
    <text x="166" y="332" font-family="Inter, system-ui, Arial" font-size="22" font-weight="800" fill="#075247">Onboarding</text>
    <text x="166" y="362" font-family="Inter, system-ui, Arial" font-size="16" fill="#596572">Foundation and setup</text>
    <path d="M 166 388 H 330" stroke="#0d6b5f" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
    <circle cx="188" cy="414" r="8" fill="#0d6b5f" opacity="0.55"/>
    <circle cx="214" cy="414" r="8" fill="#0d6b5f" opacity="0.35"/>
    <circle cx="240" cy="414" r="8" fill="#0d6b5f" opacity="0.25"/>
  </g>

  <g>
    <rect x="395" y="260" width="230" height="190" rx="18" fill="#eef2f7" stroke="#d6deea"/>
    <text x="421" y="300" font-family="Inter, system-ui, Arial" font-size="16" font-weight="800" fill="#1a6fa1">02</text>
    <text x="421" y="332" font-family="Inter, system-ui, Arial" font-size="22" font-weight="800" fill="#1a6fa1">Activation</text>
    <text x="421" y="362" font-family="Inter, system-ui, Arial" font-size="16" fill="#596572">Enable what matters</text>
    <path d="M 421 388 H 585" stroke="#1a6fa1" stroke-width="8" stroke-linecap="round" opacity="0.22"/>
    <path d="M 421 414 H 555" stroke="#1a6fa1" stroke-width="8" stroke-linecap="round" opacity="0.14"/>
  </g>

  <g>
    <rect x="650" y="260" width="230" height="190" rx="18" fill="#f5efe2" stroke="#dfd5c4"/>
    <text x="676" y="300" font-family="Inter, system-ui, Arial" font-size="16" font-weight="800" fill="#d0892f">03</text>
    <text x="676" y="332" font-family="Inter, system-ui, Arial" font-size="22" font-weight="800" fill="#d0892f">Deployment</text>
    <text x="676" y="362" font-family="Inter, system-ui, Arial" font-size="16" fill="#596572">Roll out and learn</text>
    <rect x="676" y="388" width="150" height="12" rx="6" fill="#d0892f" opacity="0.22"/>
    <rect x="676" y="410" width="118" height="12" rx="6" fill="#d0892f" opacity="0.14"/>
    <rect x="676" y="432" width="172" height="12" rx="6" fill="#d0892f" opacity="0.10"/>
  </g>

  <g>
    <rect x="905" y="260" width="165" height="190" rx="18" fill="#fff" stroke="#dfd5c4"/>
    <text x="928" y="300" font-family="Inter, system-ui, Arial" font-size="16" font-weight="800" fill="#0d6b5f">04</text>
    <text x="928" y="332" font-family="Inter, system-ui, Arial" font-size="22" font-weight="800" fill="#0d6b5f">Usage</text>
    <text x="928" y="362" font-family="Inter, system-ui, Arial" font-size="16" fill="#596572">Optimize SaaS spend</text>
    <circle cx="952" cy="415" r="34" fill="#0d6b5f" opacity="0.12"/>
    <path d="M 952 390 V 415 L 972 427" fill="none" stroke="#0d6b5f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <g opacity="0.45">
    <path d="M 370 355 H 395" stroke="#1f2a34" stroke-width="4" stroke-linecap="round"/>
    <path d="M 625 355 H 650" stroke="#1f2a34" stroke-width="4" stroke-linecap="round"/>
    <path d="M 880 355 H 905" stroke="#1f2a34" stroke-width="4" stroke-linecap="round"/>
    <path d="M 385 345 L 395 355 L 385 365" fill="#1f2a34"/>
    <path d="M 640 345 L 650 355 L 640 365" fill="#1f2a34"/>
    <path d="M 895 345 L 905 355 L 895 365" fill="#1f2a34"/>
  </g>
</svg>
