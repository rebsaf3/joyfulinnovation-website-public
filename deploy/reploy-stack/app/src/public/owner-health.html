<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Health — NyLi Assets</title>
  <style>
    :root { --bg: #0b1220; --card: #0f1b33; --text: #e5e7eb; --muted: #94a3b8; --ok: #22c55e; --bad: #ef4444; --warn:#f59e0b; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background: radial-gradient(900px 500px at 20% 0%, #12325a 0%, var(--bg) 55%); color: var(--text); }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 18px 48px; }
    h1 { margin: 0 0 6px; font-size: 1.4rem; }
    p  { margin: 0 0 18px; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
    .card { background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
    .row { display:flex; align-items:center; justify-content:space-between; gap: 10px; }
    .label { font-weight: 700; }
    .pill { font-size: 0.75rem; padding: 4px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); }
    .pill.ok { color: var(--ok); }
    .pill.bad { color: var(--bad); }
    .pill.warn { color: var(--warn); }
    pre { margin: 12px 0 0; padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.08); overflow:auto; font-size: 0.85rem; color: #cbd5e1; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap: 12px; margin-bottom: 14px; }
    .btn { background: #0d9488; color: #fff; border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>System Health</h1>
        <p>Quick snapshot of platform dependencies and configuration.</p>
      </div>
      <button class="btn" id="refreshBtn">Refresh</button>
    </div>

    <div class="grid" id="grid"></div>
    <pre id="raw" style="display:none"></pre>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const raw = document.getElementById('raw');
    const btn = document.getElementById('refreshBtn');

    btn.addEventListener('click', load);
    load();

    async function load() {
      btn.disabled = true;
      grid.innerHTML = '';
      raw.style.display = 'none';
      try {
        const res = await fetch('/api/owner/health');
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || 'Failed to load health');
        render(body);
      } catch (e) {
        grid.innerHTML = '<div class="card"><div class="row"><div class="label">Error</div><span class="pill bad">FAILED</span></div><p style="color:var(--muted);margin:10px 0 0">'+escapeHtml(e.message)+'</p></div>';
      } finally {
        btn.disabled = false;
      }
    }

    function render(data) {
      const cards = [
        { name: 'Database', ok: !!data.db?.ok, detail: 'SQLite open + query' },
        { name: 'SendGrid', ok: !!data.integrations?.sendgrid?.configured, detail: 'Configured in Owner → Integrations' },
        { name: 'LLM', ok: !!data.integrations?.llm?.configured, detail: 'Provider: ' + (data.integrations?.llm?.provider || 'unknown') },
        { name: 'Stripe', ok: !!data.integrations?.stripe?.configured, detail: 'Webhook secret set: ' + (!!data.integrations?.stripe?.webhookConfigured) },
      ];
      for (const c of cards) grid.appendChild(card(c));

      raw.style.display = 'block';
      raw.textContent = JSON.stringify(data, null, 2);
    }

    function card(c) {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML =
        '<div class="row"><div class="label">'+escapeHtml(c.name)+'</div>' +
        '<span class="pill '+(c.ok?'ok':'bad')+'">'+(c.ok?'OK':'NOT READY')+'</span></div>' +
        '<p style="margin:10px 0 0;color:var(--muted)">'+escapeHtml(c.detail || '')+'</p>';
      return el;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
