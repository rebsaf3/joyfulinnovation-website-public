<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — NyLi Assets</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(170deg, #fdf8f4 0%, #faf5f0 50%, #fff 100%);
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      width: 100%;
      max-width: 1000px;
      align-items: center;
    }

    .messaging {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .messaging h1 {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.2;
      color: #1a1a2e;
    }

    .messaging p {
      font-size: 1rem;
      line-height: 1.6;
      color: #555;
    }

    .form-card {
      background: white;
      border-radius: 12px;
      border: 1px solid #e8e2db;
      box-shadow: 0 4px 24px rgba(13, 148, 136, 0.07);
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-card h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #1a1a2e;
    }

    .form-group input {
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fafbfc;
      font-size: 0.95rem;
      color: #1a1a2e;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-primary {
      background: #0d9488;
      color: white;
    }

    .btn-primary:hover {
      background: #0f766e;
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      padding: 10px 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: #dc2626;
      font-size: 0.875rem;
      display: none;
    }

    .error.visible {
      display: block;
    }

    .success {
      padding: 10px 12px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 6px;
      color: #16a34a;
      font-size: 0.875rem;
      display: none;
    }

    .success.visible {
      display: block;
    }

    .form-footer {
      text-align: center;
      font-size: 0.875rem;
    }

    .form-footer a {
      color: #0d9488;
      text-decoration: none;
      font-weight: 500;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .messaging h1 {
        font-size: 1.8rem;
      }

      .form-card {
        padding: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="messaging">
      <h1>Reset Your Password</h1>
      <p>Enter your new password below to regain access to your NyLi Assets account.</p>
    </div>

    <div class="form-card">
      <h2>New Password</h2>

      <div class="error" id="errorMsg"></div>
      <div class="success" id="successMsg"></div>

      <form id="resetForm">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
          <small style="color: #888; font-size: 0.8rem; margin-top: 2px;">At least 8 characters</small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" id="resetBtn">
          <span id="btnText">Reset Password</span>
        </button>
      </form>

      <div class="form-footer">
        Remember your password? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    function getResetToken() {
      // Prefer fragments so tokens don't appear in server/proxy logs.
      try {
        const hashToken = new URLSearchParams((window.location.hash || '').replace(/^#/, '')).get('token');
        if (hashToken) return hashToken;
      } catch (_) {}

      // Backward compat: /reset/:token
      const parts = window.location.pathname.split('/').filter(Boolean);
      const last = parts[parts.length - 1] || null;
      if (last && last !== 'reset') return last;
      return null;
    }

    const token = getResetToken();

    const form = document.getElementById('resetForm');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const resetBtn = document.getElementById('resetBtn');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    if (!token) {
      showError('Invalid or missing reset token. Please request a new password reset link.');
      resetBtn.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!token) return;

      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!password || !confirmPassword) {
        showError('Both fields are required.');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      resetBtn.disabled = true;
      btnText.textContent = 'Resetting...';
      errorMsg.classList.remove('visible');
      successMsg.classList.remove('visible');

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password }),
        });

        if (res.ok) {
          showSuccess('Password reset successfully! Redirecting to login...');
          setTimeout(() => {
            window.location.href = '/login';
          }, 2000);
        } else {
          const data = await res.json();
          showError(data.error || 'Failed to reset password.');
        }
      } catch (err) {
        showError('Network error. Please try again.');
        console.error(err);
      } finally {
        resetBtn.disabled = false;
        btnText.textContent = 'Reset Password';
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('visible');
    }
  </script>
</body>
</html>
