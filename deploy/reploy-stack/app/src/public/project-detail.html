<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details — NyLi Assets</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(170deg, #fdf8f4 0%, #faf5f0 50%, #fff 100%);
      color: #1a1a2e;
      min-height: 100vh;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      background: white;
      border-bottom: 1px solid #e8e2db;
      position: sticky;
      top: 0;
      z-index: 1000;
      overflow: visible;
    }
    nav .logo { font-weight: 700; color: #1a1a2e; font-size: 1.1rem; text-decoration: none; }
    nav .nav-links { display: flex; gap: 24px; align-items: center; }
    nav a { color: #555; text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: color 0.2s; }
    nav a:hover, nav a.active { color: #0d9488; }
    /* User dropdown */
    .user-menu { position: relative; }
    .user-menu-btn {
      display: flex; align-items: center; gap: 6px; padding: 7px 14px;
      background: #fdf8f4; border: 1px solid #d6cfc7; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; font-weight: 600; color: #0d9488;
      transition: all 0.2s;
    }
    .user-menu-btn:hover { background: #f0ebe4; }
    .user-menu-btn .avatar {
      width: 26px; height: 26px; border-radius: 50%; background: #0d9488;
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
    }
    .user-dropdown {
      display: none; position: absolute; right: 0; top: calc(100% + 6px);
      background: white; border: 1px solid #e8e2db; border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12); min-width: 200px; z-index: 100;
      overflow: visible;
    }
    .user-dropdown.open { display: block; }
    .user-dropdown a, .user-dropdown button {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 11px 16px; font-size: 0.88rem; font-weight: 500; color: #333;
      text-decoration: none; border: none; background: none; cursor: pointer;
      transition: background 0.15s;
    }
    .user-dropdown a:hover, .user-dropdown button:hover { background: #fdf8f4; color: #0d9488; }
    .user-dropdown .sep { height: 1px; background: #e8e2db; margin: 4px 0; }
    .user-dropdown button.logout { color: #dc2626; }
    .user-dropdown button.logout:hover { background: #fef2f2; color: #dc2626; }
    main { max-width: 1100px; margin: 0 auto; padding: 32px 16px; }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 0.95rem; }
    .btn {
      padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 0.9rem; font-weight: 500; transition: all 0.2s;
    }
    .btn-primary { background: #0d9488; color: white; }
    .btn-primary:hover { background: #0f766e; }
    .card {
      background: #fff; border-radius: 12px; border: 1px solid #e8e2db;
      box-shadow: 0 4px 24px rgba(13, 148, 136, 0.07); padding: 24px; margin-bottom: 24px;
    }
    .drop-zones { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .drop-zone {
      border: 2px dashed #c4c9d4; border-radius: 10px; padding: 28px 16px;
      text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .drop-zone.dragover { border-color: #0d9488; background: #fdf8f4; }
    .drop-zone label { font-weight: 600; color: #333; display: block; margin-bottom: 8px; }
    .drop-zone p { font-size: 0.9rem; color: #888; }
    .drop-zone input { display: none; }
    .file-name { font-size: 0.85rem; color: #0d9488; font-weight: 500; margin-top: 12px; }
    .error-msg { font-size: 0.8rem; color: #dc2626; margin-top: 4px; }
    .drop-zone.has-file { border-style: solid; border-color: #16a34a; }
    .drop-zone.has-error { border-style: solid; border-color: #dc2626; }
    .progress-container { display: none; margin-bottom: 16px; }
    .progress-label { font-size: 0.9rem; margin-bottom: 4px; }
    .progress-bar-track { background: #e8e2db; border-radius: 4px; height: 8px; }
    .progress-bar { background: #0d9488; height: 100%; width: 0%; border-radius: 4px; transition: width 0.3s; }
    .error-banner { display: none; background: #fef2f2; color: #dc2626; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
    .error-banner.visible { display: block; }
    .runs-list { list-style: none; }
    .run-item {
      background: #f8f9fb; border: 1px solid #e8e2db; border-radius: 8px;
      padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
    }
    .run-item-meta { font-size: 0.9rem; color: #555; }
    .run-item-meta strong { color: #111; }
    .status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 12px;
      font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-active { background: #f0fdf4; color: #16a34a; }
    .status-completed { background: #eff6ff; color: #2563eb; }
    .status-archived { background: #f5f5f5; color: #888; }
    .project-meta-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 24px;
    }
    .meta-item { font-size: 0.9rem; }
    .meta-item .meta-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 2px; }
    .meta-item .meta-value { color: #333; font-weight: 500; }
    .locked-banner {
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 16px 20px;
      margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
    }
    .locked-banner .icon { font-size: 1.4rem; }
    .locked-banner .text { font-size: 0.9rem; color: #1e40af; }
    .btn-outline {
      padding: 8px 16px; border-radius: 6px; border: 1px solid #d1d5db; background: white;
      cursor: pointer; font-size: 0.85rem; font-weight: 500; color: #555; transition: all 0.2s;
    }
    .btn-outline:hover { border-color: #0d9488; color: #0d9488; }
    .btn-success { background: #16a34a; color: white; border: none; }
    .btn-success:hover { background: #15803d; }
    .btn-warning { background: #ca8a04; color: white; border: none; }
    .btn-warning:hover { background: #a16207; }
    .analytics-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 24px;
    }
    .analytics-card {
      background: #f8f9fb; border: 1px solid #e8e2db; border-radius: 10px;
      padding: 20px; text-align: center;
    }
    .analytics-card .a-value {
      font-size: 2rem; font-weight: 700; margin-bottom: 2px;
    }
    .analytics-card .a-label {
      font-size: 0.8rem; color: #888; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px;
    }
    /* Tooltips */
    .tooltip-trigger { position: relative; display: inline-flex; align-items: center; gap: 5px; }
    .tooltip-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%; background: #e8e2db; color: #888;
      font-size: 0.65rem; font-weight: 700; cursor: help; flex-shrink: 0;
      transition: background 0.2s, color 0.2s; font-style: normal;
    }
    .tooltip-icon:hover { background: #0d9488; color: white; }
    .tooltip-icon::after {
      content: attr(data-tooltip); position: absolute; left: 50%; transform: translateX(-50%);
      bottom: calc(100% + 8px); background: #1a1a2e; color: #fff; padding: 8px 12px;
      border-radius: 8px; font-size: 0.78rem; font-weight: 400; line-height: 1.4;
      white-space: normal; width: max-content; max-width: 260px;
      pointer-events: none; opacity: 0; transition: opacity 0.2s;
      z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      text-transform: none; letter-spacing: normal;
    }
    .tooltip-icon::before {
      content: ''; position: absolute; left: 50%; transform: translateX(-50%);
      bottom: calc(100% + 2px); border: 5px solid transparent;
      border-top-color: #1a1a2e; pointer-events: none; opacity: 0; transition: opacity 0.2s;
      z-index: 1000;
    }
    .tooltip-icon:hover::after, .tooltip-icon:hover::before { opacity: 1; }
    .charts-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;
    }
    .chart-box {
      background: #f8f9fb; border: 1px solid #e8e2db; border-radius: 10px; padding: 20px;
    }
    .chart-box h3 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }
    .chart-box canvas { width: 100% !important; height: 220px !important; }
    /* Users table */
    .users-section { margin-top: 0; }
    .users-filter-bar {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
    }
    .users-filter-bar input,
    .users-filter-bar select {
      padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 0.85rem; background: #fff; color: #333;
    }
    .users-filter-bar input { flex: 1; min-width: 180px; }
    .users-table-wrap { overflow-x: auto; }
    .users-table {
      width: 100%; border-collapse: collapse; font-size: 0.88rem;
    }
    .users-table th {
      text-align: left; padding: 10px 14px; background: #f8f9fb;
      border-bottom: 2px solid #e8e2db; font-weight: 600; color: #555;
      cursor: pointer; white-space: nowrap; user-select: none;
    }
    .users-table th:hover { color: #0d9488; }
    .users-table th .sort-arrow { font-size: 0.7rem; margin-left: 4px; color: #aaa; }
    .users-table th .sort-arrow.active { color: #0d9488; }
    .users-table td {
      padding: 10px 14px; border-bottom: 1px solid #f0f0f0; color: #333;
    }
    .users-table tr:hover td { background: #f8f9fb; }
    .audit-badge {
      display: inline-block; padding: 3px 10px; border-radius: 10px;
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .audit-pending { background: #fef3c7; color: #92400e; }
    .audit-confirmed { background: #d1fae5; color: #065f46; }
    .audit-revoked { background: #fee2e2; color: #991b1b; }
    .source-label {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 0.72rem; font-weight: 600; background: #fdf8f4; color: #0d9488;
    }
    .users-count { font-size: 0.85rem; color: #888; font-weight: 400; }
    /* Financial insights */
    .financial-card {
      background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
      border: 1px solid #bbf7d0; border-radius: 12px; padding: 24px; margin-bottom: 24px;
    }
    .financial-card h2 { color: #065f46; margin-bottom: 16px; font-size: 1.2rem; }
    .financial-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .fin-item { background: white; border-radius: 10px; padding: 16px; text-align: center; border: 1px solid #d1fae5; }
    .fin-value { font-size: 1.6rem; font-weight: 700; margin-bottom: 2px; }
    .fin-value.savings { color: #16a34a; }
    .fin-value.cost { color: #dc2626; }
    .fin-value.potential { color: #2563eb; }
    .fin-value.neutral { color: #6b7280; }
    .fin-label { font-size: 0.78rem; color: #6b7280; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    .fin-note { font-size: 0.82rem; color: #065f46; margin-top: 16px; padding: 12px 16px; background: white; border-radius: 8px; border-left: 4px solid #16a34a; line-height: 1.5; }
    .fin-note strong { color: #047857; }
    .roi-bar-track { background: #e5e7eb; border-radius: 6px; height: 12px; margin-top: 12px; overflow: hidden; }
    .roi-bar { background: linear-gradient(90deg, #16a34a, #059669); height: 100%; border-radius: 6px; transition: width 0.6s ease; min-width: 2px; }

    /* ── Accordion ─────────────────────────────────────────────────── */
    .accordion { border: 1px solid #e8e2db; border-radius: 10px; overflow: hidden; margin-top: 4px; }
    .accordion-item { border-bottom: 1px solid #e8e2db; }
    .accordion-item:last-child { border-bottom: none; }
    .accordion-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px; background: #f8f9fb; cursor: pointer;
      font-weight: 600; font-size: 0.92rem; color: #333;
      transition: background 0.15s; user-select: none;
    }
    .accordion-header:hover { background: #fdf8f4; color: #0d9488; }
    .accordion-chevron {
      font-size: 0.7rem; color: #888; transition: transform 0.25s;
    }
    .accordion-item.open .accordion-chevron { transform: rotate(180deg); }
    .accordion-body {
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
    }
    .accordion-item.open .accordion-body { max-height: 2000px; }
    .accordion-content { padding: 16px 20px; font-size: 0.9rem; color: #444; line-height: 1.65; }
    .accordion-content ol, .accordion-content ul { padding-left: 20px; margin: 8px 0; }
    .accordion-content li { margin-bottom: 6px; }
    .accordion-content strong { color: #1a1a2e; }
    .accordion-content code {
      background: #fdf8f4; padding: 1px 6px; border-radius: 4px;
      font-family: "Fira Code", Consolas, monospace; font-size: 0.84rem;
      color: #0d9488;
    }
    .template-block {
      background: #f8f9fb; border: 1px solid #e8e2db; border-radius: 8px;
      padding: 14px 16px; margin: 12px 0; font-family: "Fira Code", Consolas, monospace;
      font-size: 0.82rem; line-height: 1.6; color: #333; overflow-x: auto;
      white-space: pre; position: relative;
    }
    .template-label {
      display: inline-block; padding: 2px 10px; border-radius: 4px;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.3px;
      margin-bottom: 8px; font-family: Inter, sans-serif;
    }
    .template-label-a { background: #eff6ff; color: #2563eb; }
    .template-label-b { background: #f0fdf4; color: #16a34a; }
    .copy-btn {
      position: absolute; top: 10px; right: 10px; padding: 4px 10px;
      border: 1px solid #d1d5db; border-radius: 4px; background: white;
      font-size: 0.75rem; font-weight: 600; cursor: pointer; color: #555;
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color: #0d9488; color: #0d9488; }
    .tip-box {
      display: flex; align-items: flex-start; gap: 10px;
      background: #fefce8; border: 1px solid #fde68a; border-radius: 8px;
      padding: 12px 16px; margin-top: 12px; font-size: 0.85rem; color: #92400e;
    }
    .tip-box .tip-icon { font-size: 1.1rem; flex-shrink: 0; }
    .download-tpl-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border: 1px solid #d1d5db; border-radius: 6px;
      background: white; font-size: 0.82rem; font-weight: 600; color: #0d9488;
      cursor: pointer; transition: all 0.15s; margin-top: 8px;
    }
    .download-tpl-btn:hover { background: #fdf8f4; border-color: #0d9488; }

    /* Edit Project Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 14px; width: 560px; max-width: 94vw;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 12px 48px rgba(0,0,0,0.2);
      padding: 28px 32px 24px;
    }
    .modal h2 { font-size: 1.2rem; margin-bottom: 20px; color: #1a1a2e; }
    .modal-field { margin-bottom: 16px; }
    .modal-field label {
      display: block; font-size: 0.82rem; font-weight: 600; color: #555;
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px;
    }
    .modal-field input,
    .modal-field select,
    .modal-field textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #d6cfc7; border-radius: 8px;
      font-family: inherit; font-size: 0.9rem; color: #333; background: #f8f9fc;
      transition: border-color 0.2s;
    }
    .modal-field input:focus,
    .modal-field select:focus,
    .modal-field textarea:focus {
      outline: none; border-color: #0d9488; background: white;
    }
    .modal-field textarea { resize: vertical; min-height: 70px; }
    .modal-field .field-hint {
      font-size: 0.78rem; color: #888; margin-top: 3px;
    }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .modal-actions {
      display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px;
      padding-top: 16px; border-top: 1px solid #e8e2db;
    }
    .btn-edit-project {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 6px; border: 1px solid #d1d5db;
      background: white; cursor: pointer; font-size: 0.85rem; font-weight: 600;
      color: #555; transition: all 0.2s;
    }
    .btn-edit-project:hover { border-color: #0d9488; color: #0d9488; }

    @media (max-width: 1024px) {
      .project-meta-grid { grid-template-columns: repeat(3, 1fr); }
      .analytics-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .charts-row { grid-template-columns: 1fr; }
      .project-meta-grid { grid-template-columns: repeat(2, 1fr); }
      .analytics-grid { grid-template-columns: repeat(2, 1fr); }
      .financial-grid { grid-template-columns: 1fr 1fr; }
      .modal-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .project-meta-grid { grid-template-columns: 1fr; }
      .analytics-grid { grid-template-columns: 1fr; }
      .financial-grid { grid-template-columns: 1fr; }
      .drop-zones { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
    <a href="/home" class="logo">NyLi<span style="color:#0d9488">Assets</span></a>
    <div class="nav-links">
      <a href="/home">Home</a>
      <a href="/projects" class="active">Projects</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/communications">Communications</a>
      <a href="/calendar">Calendar</a>
      <div class="user-menu">
        <button class="user-menu-btn" id="userMenuBtn">
          <span class="avatar" id="userAvatar">?</span>
          <span id="userMenuLabel">Menu</span>
          <span style="font-size:0.6rem;">&#9660;</span>
        </button>
        <div class="user-dropdown" id="userDropdown">
          <a href="/settings">&#9881; Account Settings</a>
          <a href="/settings#preferences">&#9776; Preferences</a>
          <a href="/help">&#10067; Help</a>
          <div class="sep"></div>
          <button class="logout" id="logoutBtn">&#10140; Log Out</button>
        </div>
      </div>
    </div>
  </nav>

<main id="mainContent">
  <p>Loading project...</p>
</main>

<script>
(async function () {
  const main = document.getElementById('mainContent');
  const projectId = window.location.pathname.split('/').pop();

  async function api(url, opts) {
    const res = await fetch(url, { credentials: 'same-origin', ...opts });
    if (res.status === 401) { window.location.href = '/login'; return null; }
    return res;
  }

  async function loadProject() {
    const res = await api(`/api/projects/${projectId}`);
    if (!res || !res.ok) {
      main.innerHTML = '<h1>Project not found</h1><p>Could not load the requested project.</p>';
      return;
    }
    const project = await res.json();
    renderProject(project);
  }

  function renderProject(project) {
    const isLocked = project.status === 'completed' || project.status === 'archived';
    const hasRuns = project.runs && project.runs.length > 0;
    const showUpload = !isLocked && !hasRuns; // Only show upload for active projects with zero runs
    const statusLabel = project.status || 'active';
    const a = project.analytics || {};

    main.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:4px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <h1>${escapeHtml(project.name)}</h1>
          ${!isLocked ? '<button class="btn-edit-project" id="editProjectBtn" title="Edit project fields">&#9998; Edit</button>' : ''}
        </div>
        <span class="status-badge status-${statusLabel}">${statusLabel}</span>
      </div>
      <p class="subtitle">${escapeHtml(project.description || 'No description.')}</p>

      <div class="project-meta-grid">
        <div class="meta-item">
          <div class="meta-label">Product Name</div>
          <div class="meta-value">${escapeHtml(project.product_name || '—')}</div>
        </div>
        <div class="meta-item">          <div class="meta-label">Cost per User</div>
          <div class="meta-value">${project.cost_per_user > 0 ? formatCurrency(project.cost_per_user, project.currency || 'USD') + '/mo' : '\u2014'}</div>
        </div>
        <div class="meta-item">          <div class="meta-label">Owner</div>
          <div class="meta-value">${escapeHtml(project.created_by_email || '—')}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Send Date</div>
          <div class="meta-value">${project.send_date ? new Date(project.send_date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—'}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Created</div>

  function setupUsersTable(users) {
    let allUsers = [...users];
    let sortCol = 'email';
    let sortDir = 'asc';

    const tbody = document.getElementById('usersTableBody');
    const countEl = document.getElementById('usersCount');
    const noMsg = document.getElementById('noUsersMsg');
    const searchInput = document.getElementById('usersSearch');
    const statusFilter = document.getElementById('usersStatusFilter');
    const sourceFilter = document.getElementById('usersSourceFilter');

    function getFiltered() {
      let list = allUsers;
      const q = (searchInput.value || '').trim().toLowerCase();
      const st = statusFilter.value;
      const src = sourceFilter.value;

      if (q) list = list.filter(u => ((u.email || '') + ' ' + (u.user_key || '')).toLowerCase().includes(q));
      if (st) list = list.filter(u => u.audit_status === st);
      if (src) list = list.filter(u => u.source === src);

      list.sort((a, b) => {
        let va, vb;
        if (sortCol === 'email') {
          va = (a.email || a.user_key || '').toLowerCase();
          vb = (b.email || b.user_key || '').toLowerCase();
        } else if (sortCol === 'created_at') {
          va = a.created_at || '';
          vb = b.created_at || '';
        } else {
          va = (a[sortCol] || '').toLowerCase();
          vb = (b[sortCol] || '').toLowerCase();
        }
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      return list;
    }

    function render() {
      const list = getFiltered();
      countEl.textContent = '(' + list.length + ')';

      if (list.length === 0) {
        tbody.innerHTML = '';
        noMsg.style.display = 'block';
        return;
      }
      noMsg.style.display = 'none';

      const sourceLabel = (s) => s === 'onlyInFileA' ? 'File A' : s === 'onlyInFileB' ? 'File B' : s;

      tbody.innerHTML = list.map(u => `
        <tr>
          <td>${escapeHtml(u.email || u.user_key || '—')}</td>
          <td><span class="source-label">${sourceLabel(u.source)}</span></td>
          <td><span class="audit-badge audit-${u.audit_status}">${u.audit_status}</span></td>
          <td>${u.created_at ? new Date(u.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—'}</td>
        </tr>
      `).join('');

      document.querySelectorAll('.users-table th .sort-arrow').forEach(el => el.classList.remove('active'));
      const arrowMap = { email: 'sortEmail', source: 'sortSource', audit_status: 'sortStatus', created_at: 'sortDate' };
      const activeArrow = document.getElementById(arrowMap[sortCol]);
      if (activeArrow) {
        activeArrow.classList.add('active');
        activeArrow.textContent = sortDir === 'asc' ? '▲' : '▼';
      }
    }

    document.querySelectorAll('.users-table th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.getAttribute('data-col');
        if (sortCol === col) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortCol = col;
          sortDir = 'asc';
        }
        render();
      });
    });

    searchInput.addEventListener('input', render);
    statusFilter.addEventListener('change', render);
    sourceFilter.addEventListener('change', render);

    render();
  }

  function renderFinancialInsights(project) {
    var slot = document.getElementById('financialInsightsSlot');
    if (!slot) return;
    var fi = project.financialInsights || {};
    var curr = fi.currency || project.currency || 'USD';
    if (!fi.costPerUser || fi.costPerUser <= 0) return;
    var annualSavings = fi.revokedSavings * 12;
    var annualPotential = fi.potentialSavings * 12;
    var pct = parseFloat(fi.savingsPercent) || 0;

    var html = '<div class="financial-card">'
      + '<h2>\uD83D\uDCB0 Financial Insights</h2>'
      + '<div class="financial-grid">'
      + '<div class="fin-item"><div class="fin-value savings">' + formatCurrency(fi.revokedSavings, curr) + '</div><div class="fin-label">Monthly Savings (Revoked)</div></div>'
      + '<div class="fin-item"><div class="fin-value potential">' + formatCurrency(fi.potentialSavings, curr) + '</div><div class="fin-label">Potential Monthly Savings</div></div>'
      + '<div class="fin-item"><div class="fin-value savings">' + formatCurrency(annualSavings, curr) + '</div><div class="fin-label">Projected Annual Savings</div></div>'
      + '<div class="fin-item"><div class="fin-value cost">' + formatCurrency(fi.confirmedCost, curr) + '</div><div class="fin-label">Confirmed License Spend</div></div>'
      + '<div class="fin-item"><div class="fin-value neutral">' + formatCurrency(fi.totalLicenseCost, curr) + '</div><div class="fin-label">Total Flagged License Cost</div></div>'
      + '<div class="fin-item"><div class="fin-value savings">' + fi.savingsPercent + '%</div><div class="fin-label">Savings Rate</div></div>'
      + '</div>'
      + '<div style="margin-top:16px;">'
      + '<div style="display:flex;justify-content:space-between;font-size:0.82rem;color:#065f46;font-weight:600;margin-bottom:4px;">'
      + '<span>Savings Progress</span>'
      + '<span>' + fi.savingsPercent + '% of flagged licenses reclaimed</span>'
      + '</div>'
      + '<div class="roi-bar-track"><div class="roi-bar" style="width:' + Math.min(pct, 100) + '%;"></div></div>'
      + '</div>';

    if (annualPotential > 0) {
      var pending = (project.analytics.totalPending || 0).toLocaleString();
      html += '<div class="fin-note">\uD83D\uDCA1 <strong>Insight:</strong> By resolving the remaining <strong>' + pending + '</strong> pending users, your organization could save up to <strong>' + formatCurrency(annualPotential, curr) + '/year</strong> in unused license costs. Each revoked license at <strong>' + formatCurrency(fi.costPerUser, curr) + '/mo</strong> translates to <strong>' + formatCurrency(fi.costPerUser * 12, curr) + '/year</strong> in savings per user.</div>';
    }

    html += '</div>';
    slot.innerHTML = html;
  }

  function drawProjectCharts(project) {
    const a = project.analytics || {};

    // Donut chart
    if (a.totalFlagged > 0) {
      const ctx1 = document.getElementById('projectDonut').getContext('2d');
      new Chart(ctx1, {
        type: 'doughnut',
        data: {
          labels: ['Confirmed', 'Revoked', 'Pending'],
          datasets: [{
            data: [a.totalConfirmed, a.totalRevoked, a.totalPending],
            backgroundColor: ['#16a34a', '#dc2626', '#ca8a04'],
            borderColor: '#fff',
            borderWidth: 3,
            hoverOffset: 6,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: {
            legend: { position: 'bottom', labels: { font: { size: 12, weight: '600' }, padding: 16, usePointStyle: true } },
          },
        },
      });
    }

    // Bar chart per run
    if (project.runs && project.runs.length > 0) {
      const labels = project.runs.map((r, i) => 'Run ' + (project.runs.length - i)).reverse();
      const runsReversed = [...project.runs].reverse();
      const ctx2 = document.getElementById('projectBar').getContext('2d');
      new Chart(ctx2, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Confirmed', data: runsReversed.map(r => r.confirmed), backgroundColor: '#16a34a', borderRadius: 4, barPercentage: 0.6 },
            { label: 'Revoked', data: runsReversed.map(r => r.revoked), backgroundColor: '#dc2626', borderRadius: 4, barPercentage: 0.6 },
            { label: 'Pending', data: runsReversed.map(r => r.pending), backgroundColor: '#ca8a04', borderRadius: 4, barPercentage: 0.6 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.05)' }, stacked: true },
            x: { ticks: { font: { size: 11 } }, grid: { display: false }, stacked: true },
          },
          plugins: {
            legend: { position: 'top', align: 'end', labels: { font: { size: 11, weight: '600' }, usePointStyle: true, padding: 12 } },
          },
        },
      });
    }
  }

  function setupUploadForm() {
    const form = document.getElementById("uploadForm");
    const submitBtn = document.getElementById("submitBtn");
    const zoneA = document.getElementById("zoneA");
    const zoneB = document.getElementById("zoneB");
    const fileA = document.getElementById("fileA");
    const fileB = document.getElementById("fileB");
    const progress = document.getElementById("progress");
    const progBar = document.getElementById("progressBar");
    const progLabel = document.getElementById("progressLabel");
    const errorBanner = document.getElementById("errorBanner");

    function validateFile(file, zone, nameEl, errorEl) {
      nameEl.textContent = "";
      errorEl.textContent = "";
      zone.classList.remove("has-file", "has-error");
      if (!file) return false;
      const isCSV = file.name.toLowerCase().endsWith(".csv") || file.type === "text/csv";
      if (!isCSV) {
        zone.classList.add("has-error");
        errorEl.textContent = "Please select a valid .csv file.";
        return false;
      }
      zone.classList.add("has-file");
      nameEl.textContent = file.name;
      return true;
    }

    function refreshButton() {
      submitBtn.disabled = !(zoneA.classList.contains("has-file") && zoneB.classList.contains("has-file"));
    }

    [zoneA, zoneB].forEach(zone => {
      zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("dragover"); });
      zone.addEventListener("dragleave", e => { e.preventDefault(); zone.classList.remove("dragover"); });
      zone.addEventListener("drop", e => {
        e.preventDefault();
        zone.classList.remove("dragover");
        const input = zone.querySelector('input[type="file"]');
        if (e.dataTransfer.files.length) {
          input.files = e.dataTransfer.files;
          input.dispatchEvent(new Event('change'));
        }
      });
      zone.addEventListener('click', () => zone.querySelector('input[type="file"]').click());
    });

    fileA.addEventListener("change", () => {
      validateFile(fileA.files[0], zoneA, document.getElementById("fileAName"), document.getElementById("fileAError"));
      refreshButton();
    });
    fileB.addEventListener("change", () => {
      validateFile(fileB.files[0], zoneB, document.getElementById("fileBName"), document.getElementById("fileBError"));
      refreshButton();
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const formData = new FormData(form);
      formData.append('projectId', projectId);

      const xhr = new XMLHttpRequest();
      xhr.upload.addEventListener("progress", function (e) {
        if (e.lengthComputable) {
          const percent = Math.round((e.loaded / e.total) * 100);
          progBar.style.width = percent + "%";
          progLabel.textContent = "Uploading... " + percent + "%";
        }
      });
      xhr.addEventListener("load", function () {
        progress.style.display = "none";
        if (xhr.status >= 200 && xhr.status < 300) {
          const data = JSON.parse(xhr.responseText);
          window.location.href = `/history#${data.runId}`;
        } else {
          showError(JSON.parse(xhr.responseText).error || "An unknown error occurred.");
        }
      });
      xhr.addEventListener("error", () => showError("Network error."));

      progress.style.display = "block";
      progBar.style.width = "0%";
      errorBanner.classList.remove("visible");
      xhr.open("POST", "/api/compare");
      xhr.send(formData);
    });

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.add("visible");
    }
  }

  var currencySymbols = { USD:'$', EUR:'\u20ac', GBP:'\u00a3', CAD:'C$', AUD:'A$', JPY:'\u00a5', CHF:'CHF ', INR:'\u20b9', BRL:'R$', MXN:'MX$' };
  function formatCurrency(amount, currency) {
    var sym = currencySymbols[currency] || currency + ' ';
    if (currency === 'JPY') return sym + Math.round(amount).toLocaleString();
    return sym + amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function escapeHtml(str) {
    if (!str) return '';
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  // ── Accordion template helpers ──────────────────────────────────────
  function copyTemplate(blockId) {
    const block = document.getElementById(blockId);
    if (!block) return;
    // Extract just the CSV text (skip the label span and button)
    const lines = block.textContent.split('\n');
    // Filter out the label text and 'Copy' button text
    const csv = lines.filter(l => l.trim() && l.trim() !== 'Copy' && !l.match(/^(licenses|ad_users)\.csv$/)).join('\n');
    navigator.clipboard.writeText(csv).then(() => {
      const btn = block.querySelector('.copy-btn');
      if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy'; }, 1500); }
    }).catch(() => {});
  }

    const blob = new Blob([csv], { type: 'text/csv' });

      // User dropdown
    (function initUserMenu() {
      const btn = document.getElementById('userMenuBtn');
      const dd  = document.getElementById('userDropdown');
      if (!btn || !dd) return;
      btn.addEventListener('click', e => { e.stopPropagation(); dd.classList.toggle('open'); });

        if (ml) ml.textContent = me.email;
      }).catch(() => {});

    document.getElementById('logoutBtn').addEventListener('click', async function() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/login'; });

  loadProject();
})();
