name: Deploy to Railway

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/reploy-stack/app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: deploy/reploy-stack/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Deploy to Railway
        run: railway up --service joyfulinnovation-website-dev

      - name: Smoke check (health endpoint)
        run: |
          sleep 10
          url="https://$(railway service info --service joyfulinnovation-website-dev --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))" || echo '')/healthz"
          if [ -n "$url" ] && [ "$url" != "/healthz" ]; then
            curl --fail --silent --max-time 15 "$url" || echo "[WARN] Health check unreachable — verify manually."
          else
            echo "[INFO] Could not resolve service URL for smoke check; skipping."
          fi
